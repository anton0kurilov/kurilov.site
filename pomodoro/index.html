<!DOCTYPE html>
<html lang="en">

<head>

	<title>Pomodoro Timer</title>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto+Mono:400,700">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="/assets/css/pomodoro.css">
	<meta charset="utf-8">
	<meta name="google" value="notranslate">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<meta property="og:locale" content="en_US">
	<meta property="og:type" content="website">

</head>

<body>
	<main>
		<h1>Pomodoro</h1>
		<div class="time">
			<span id="time-min">25</span><span>:</span><span id="time-sec">00</span>
		</div>
		<div class="controls">
			<a id="start" href="#"><i class="fa fa-play"></i></a>
			<a id="pause" href="#"><i class="fa fa-pause"></i></a>
			<a id="reset" href="#"><i class="fa fa-undo"></i></a>
			<a id="settings" href="#"><i class="fa fa-cog"></i></a>
		</div>
	</main>
	<div class="settings-wrapper">
		<div class="settings">
			<label>
     			Pomodoro
      			<input id="duration" type="text" maxlength="2"/>
    		</label>
			<label>
     			Break
      			<input id="break" type="text" maxlength="2"/>
    		</label>
			<p id="message">Please enter correct values</p>
			<a id="apply" href="#">Apply</a>
		</div>
	</div>
	<script src="https://code.jquery.com/jquery-2.2.1.min.js"></script>
	<script src="/assets/js/pomodoro.js"></script>
</body>

</html>
